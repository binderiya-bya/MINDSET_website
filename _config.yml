# Site settings
title: MINDSET 2.0
tagline: A global macroeconometric model for climate, development, and trade policy analysis
description: >-
  MINDSET 2.0 is a global, demand-driven, recursively dynamic macroeconometric
  simulation model used to evaluate how climate change, climate policies, and
  other development and trade policies affect macroeconomic, sector-level, and
  labour market outcomes.
author: MINDSET Project
email:

# Deploying at https://binderiya-bya.github.io/MINDSET_website/
baseurl: "/MINDSET_website"
url: "https://binderiya-bya.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title:output_ext

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  blog:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Navigation — used by _includes/nav.html
navigation:
  - title: Home
    url: /
  - title: The MINDSET Model
    url: /model/
  - title: Publications
    url: /publications/
  - title: Blog
    url: /blog/
  - title: Announcements
    url: /announcements/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - DEPLOY.md
  - README.md
  - assets/pdfs
  - docs
  - "*.pdf"
