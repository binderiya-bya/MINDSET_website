- id: mindset-model-2026
  type: Documentation
  title: MINDSET 2.0 Model Documentation
  authors_short: Kiss-Dobronyi, Brancher, Dorband, Pollitt, Byambasuren, Lin, Hartvig, Lehr
  year: 2026
  month: February
  description: Structure, theoretical underpinnings, mechanisms, and practical considerations of MINDSET 2.0.
  ssrn_url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=6188978
  abstract: >-
    MINDSET 2.0 is a global, demand-driven, recursively dynamic macroeconometric
    simulation model that is used to evaluate how climate change, climate
    policies, and other development and trade policies affect macroeconomic,
    sector-level, and labour market outcomes. The goal of MINDSET is to provide
    actionable policy advice and to enable informed decisions that are tailored
    to country-specific opportunities and risks, while adopting a
    whole-of-economy and people-centred strategy. This document provides a
    comprehensive review of MINDSET 2.0, including theoretical underpinnings,
    mechanisms, and practical considerations.
  apa: >-
    Kiss-Dobronyi, B., Brancher, M., Dorband, I. I., Pollitt, H., Byambasuren, B.,
    Lin, X., Hartvig, Á. D., &amp; Lehr, U. (2026). MINDSET 2.0 Model Documentation.
    SSRN. https://papers.ssrn.com/sol3/papers.cfm?abstract_id=6188978
  bibtex: |
    @misc{kissdobronyi2026mindset,
      title        = {{MINDSET 2.0 Model Documentation}},
      author       = {Kiss-Dobronyi, Bence and Brancher, Marco and Dorband, Ira Irina
                      and Pollitt, Hector and Byambasuren, Binderiya and Lin, Xinru
                      and Hartvig, {\'A}ron D{\'e}nes and Lehr, Ulrike},
      year         = {2026},
