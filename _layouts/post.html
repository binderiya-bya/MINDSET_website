---
layout: default
---
<section class="page-hero">
  <div class="container">
    <p class="eyebrow">Announcement · {{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lede">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>
<section class="page-body">
  <div class="container prose">
    {{ content }}
    <hr>
    <p><a href="{{ '/announcements/' | relative_url }}">&larr; Back to all announcements</a></p>
  </div>
</section>
