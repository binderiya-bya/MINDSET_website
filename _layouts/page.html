---
layout: default
---
<section class="page-hero">
  <div class="container">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lede">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>
<section class="page-body">
  <div class="container prose">
    {{ content }}
  </div>
</section>
