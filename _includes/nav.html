<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark">MINDSET</span>
      <span class="brand-sub">2.0</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-burger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </label>
      <ul class="nav-links">
        {% for item in site.navigation %}
          {% assign current = page.url | remove_first: '/' | split: '/' | first %}
          {% assign target  = item.url  | remove_first: '/' | split: '/' | first %}
          <li>
            <a href="{{ item.url | relative_url }}"
               class="{% if current == target or (item.url == '/' and page.url == '/') %}active{% endif %}">
              {{ item.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
